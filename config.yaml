  # About
  about:
    enable: true
    title: "About Me"
    #image: "/images/me.png"
    content: |-
       I'm a Cloud and Platform Engineer with 5+ years of experience building reliable, scalable distributed systems across AWS and GCP. Currently at Automation Anywhere, I architect multi-cluster Kubernetes platforms spanning 90+ GKE/EKS clusters, drive GitOps adoption with ArgoCD, and build AI/ML infrastructure for inference workloads.

       I'm passionate about platform engineering, infrastructure automation, and the intersection of cloud-native systems with AI/ML — from GPU workload orchestration to agentic observability tooling.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Kubernetes · Helm · ArgoCD · Karpenter · KEDA"
        - "AWS (EKS, EC2, S3, IAM) · GCP (GKE)"
        - "Terraform · GitOps · Docker · Linux"
        - "Prometheus · Grafana · OpenTelemetry · Istio"
        - "Python · Go · Shell Scripting"
        - "GPU Orchestration · vLLM · AI/ML Infrastructure"
        
  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - job: "Cloud Engineer"
        company: "Automation Anywhere"
        companyUrl: "https://www.automationanywhere.com/"
        date: "August 2024 - Present"
        content: |
          - Architected an Istio-based multi-cluster service mesh across 90+ GKE/EKS clusters, securing 100% of cross-cluster service traffic with mTLS and achieving full traffic visibility across application and AI/ML inference workloads.
          - Standardized infrastructure and application deployments using Helm charts and ArgoCD GitOps workflows across EKS/GKE, cutting deployment time by 40% and manual configuration by 60%.
          - Optimized compute workload autoscaling using AWS ASGs and GKE node auto-provisioning alongside HPA and VPA, achieving 30–40% infrastructure cost reduction while maintaining high availability across 90+ clusters.
          - Engineered a two-tier IaC architecture with a GitOps-driven control plane for environment lifecycle and a Terraform infra plane for AWS/GCP provisioning, reducing onboarding time by 70% and eliminating manual configuration drift.
          - Reduced MTTD by 60% by engineering a Python-based incident response agent using a custom MCP server to autonomously correlate logs, metrics, and events in real time.
          - Tech Stack: Kubernetes, Helm, ArgoCD, Istio, Terraform, AWS (EKS), GCP (GKE), Python, Prometheus, Grafana

      - job: "Software Engineer Intern, Linux Systems"
        company: "Activision Blizzard"
        companyUrl: "https://www.activision.com/"
        date: "June 2023 - September 2023"
        content: |
          - Built an infrastructure configuration discovery system aggregating real-time resource data across regions, giving teams accurate platform visibility and reducing deployment misconfigurations by 40%.
          - Spearheaded full-lifecycle containerization and Kubernetes deployment of the platform, reducing deployment time by 75% and cutting provisioning time by 90% via Terraform on OpenStack.
          - Tech Stack: Python, Bash Scripting, Docker, Kubernetes, Terraform, Nginx, OpenStack

      - job: "Cloud Engineer"
        company: "Tata Consultancy Services"
        companyUrl: "https://www.tcs.com/"
        date: "July 2019 - August 2022"
        content: |
          - Designed AWS VPC networking for EKS across 3 environments with CNI-aware subnet sizing, pod-level security groups, NACLs for isolation, and VPC peering for cross-environment service discovery supporting 100+ node clusters.
          - Established on-call rotation and runbooks for infrastructure incidents, owning end-to-end resolution and contributing to a 45% MTTR reduction via Prometheus, Grafana, and ELK stack.
          - Developed Python scripts to automate AWS resource inventory and cost reporting across 20+ regions, reducing manual reporting overhead by 80% and giving teams real-time visibility into resource utilization and monthly spend.
          - Tech Stack: Python, AWS (EC2, EKS, S3, IAM, CloudWatch, Lambda), Kubernetes, Prometheus, Grafana, ELK

      - job: "Software Engineer Intern"
        company: "CloudYuga Technologies"
        companyUrl: "https://cloudyuga.guru/"
        date: "December 2018 - May 2019"
        content: |
          - Implemented reusable Terraform modules for GKE networking, compute, and storage with GitHub Actions CI/CD checks, reducing infrastructure provisioning time from days to under 2 hours.
          - Launched an EdTech platform on GKE using Kubernetes manifests with RBAC, ConfigMaps, Secrets, Ingress, and PVCs, reducing rollout failures by 35%.
          - Tech Stack: Terraform, Kubernetes, GCP (GKE), GitHub Actions, Ruby on Rails, ReactJS

