    items:
      - title: GPU-Aware Autoscaling Platform on EKS
        content: Built a GPU workload orchestration platform on EKS using Karpenter for node provisioning and KEDA for event-driven autoscaling based on GPU utilization and queue-depth metrics. Instrumented Prometheus and Grafana to track GPU memory, utilization, and job throughput with self-service dashboards for ML platform consumers.
        image: /images/projects/gpu-autoscaling.svg
        badges:
          - "Kubernetes"
          - "Karpenter"
          - "KEDA"
          - "Prometheus"
          - "Terraform"
          - "AWS EKS"

      - title: Distributed Job Notification System
        content: A distributed job notification platform leveraging a publisher-subscriber model for efficient, personalized job alerts at scale. Containerized and deployed microservices on AWS EKS with persistent storage and horizontal autoscaling for high-frequency job scheduling.
        image: /images/projects/job_notification_system.png
        badges:
